__include__: [
  '../dataset/visdrone.yml',
  '../runtime.yml',
  './include/dataloader.yml',
  './include/optimizer.yml',
  './include/rtdetrv2_r50vd.yml',
]


output_dir: ./output/rtdetrv2_dinov3b_visdrone


# 使用 DINOv3 骨干网络
RTDETR:
  backbone: DINOv3Backbone
  encoder: HybridEncoder
  decoder: RTDETRTransformerv2


DINOv3Backbone:
  model_name: dinov3_vitb16
  pretrained_path: /home/wh/fj/dinov3/weights/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth
  layers_to_use: 4
  freeze_backbone: True
  hidden_dim: 256


HybridEncoder:
  in_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.
  enc_act: 'gelu'
  expansion: 1.0
  depth_mult: 1
  act: 'silu'


RTDETRTransformerv2:
  num_layers: 3


epoches: 120

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm).*$'
      lr: 0.00001
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn)).*$'
      weight_decay: 0.

  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.0001


train_dataloader:
  dataset:
    transforms:
      policy:
        epoch: 117
  collate_fn:
    scales: ~
